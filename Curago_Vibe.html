        function MumbaiApp() {
            const [step, setStep] = useState('welcome');
            const [currentQuestion, setCurrentQuestion] = useState(0);
            const [answers, setAnswers] = useState({});
            const [email, setEmail] = useState('');
            const [result, setResult] = useState(null);

            const handleAnswerSelect = (questionId, optionIndex) => {
                setAnswers(prev => ({ ...prev, [questionId]: optionIndex }));
                
                if (currentQuestion < QUESTIONS.length - 1) {
                    setTimeout(() => setCurrentQuestion(currentQuestion + 1), 300);
                } else {
                    setTimeout(() => setStep('email'), 400);
                }
            };

            const calculateArchetype = () => {
                const scores = Object.fromEntries(Object.keys(ARCHETYPE_DESCRIPTIONS).map(k => [k, 0]));
                
                QUESTIONS.forEach(question => {
                    const answerIndex = answers[question.id];
                    if (answerIndex === undefined) return;
                    
                    const selectedOption = question.options[answerIndex];
                    if (selectedOption.archetype) {
                        scores[selectedOption.archetype] += selectedOption.score;
                    } else if (selectedOption.archetypes) {
                        selectedOption.archetypes.forEach(arch => {
                            scores[arch] += selectedOption.score;
                        });
                    }
                });
                
                return Object.entries(scores).reduce((a, b) => b[1] > a[1] ? b : a)[0];
            };

            const handleSubmitEmail = (e) => {
                e.preventDefault();
                const archetype = calculateArchetype();
                setResult({ 
                    archetype, 
                    places: PLACES_DATABASE[archetype] || [], 
                    description: ARCHETYPE_DESCRIPTIONS[archetype],
                    email 
                });
                setStep('result');
            };

            const handleSkipEmail = () => {
                const archetype = calculateArchetype();
                setResult({ 
                    archetype, 
                    places: PLACES_DATABASE[archetype] || [], 
                    description: ARCHETYPE_DESCRIPTIONS[archetype],
                    email: null
                });
                setStep('result');
            };

            return (
                <div className="min-h-screen bg-gradient-to-br from-blue-50 via-indigo-50 to-purple-50">
                    {step === 'welcome' && <WelcomeScreen onStart={() => setStep('questions')} />}
                    {step === 'questions' && (
                        <QuestionView 
                            question={QUESTIONS[currentQuestion]} 
                            current={currentQuestion} 
                            total={QUESTIONS.length}
                            onSelect={handleAnswerSelect}
                            selected={answers[QUESTIONS[currentQuestion].id]}
                        />
                    )}

                    {step === 'result' && <ResultView result={result} onRestart={() => { setStep('welcome'); setCurrentQuestion(0); setAnswers({}); setEmail(''); }} />}
                </div>
            );

                        {/* Header */}
                        <div className="bg-gradient-to-br from-blue-600 to-indigo-700 rounded-3xl shadow-2xl p-12 text-white mb-8">
                            <div className="text-center mb-6">
                                <div className="inline-block px-6 py-2 bg-white/20 rounded-full text-sm font-semibold mb-4">✨ Your Mumbai Plan for Today</div>
                                <h1 className="text-5xl font-extrabold mb-4">{archetype}</h1>
                                <p className="text-xl opacity-90 max-w-2xl mx-auto">{description.tagline}</p>
                            </div>
                            <div className="bg-white/10 backdrop-blur rounded-2xl p-6">
                                <p className="mb-4">{description.description}</p>
                                <div className="grid md:grid-cols-2 gap-4 pt-4 border-t border-white/20">
                                    <div><span className="text-sm opacity-75">Budget range</span><p className="font-semibold">{description.budget}</p></div>
                                    <div><span className="text-sm opacity-75">Travel style</span><p className="font-semibold">{description.travelStyle}</p></div>
                                </div>
                            </div>
                        </div>

                        {/* Share */}
                        <div className="bg-white rounded-2xl shadow-lg p-6 mb-8">
                            <h3 className="text-lg font-bold text-gray-900 mb-4 text-center">Share your plan with friends</h3>
                            <div className="flex flex-wrap justify-center gap-3">
                                <button onClick={handleShareTwitter} className="share-button flex items-center gap-2 px-6 py-3 bg-black hover:bg-gray-800 text-white rounded-xl font-medium shadow-md">
                                    <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
                                    Twitter
                                </button>
                                <button onClick={handleShareFacebook} className="share-button flex items-center gap-2 px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-medium shadow-md">
                                    <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                                    Facebook
                                </button>
                                <button onClick={handleShareWhatsApp} className="share-button flex items-center gap-2 px-6 py-3 bg-green-600 hover:bg-green-700 text-white rounded-xl font-medium shadow-md">
                                    <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
                                    WhatsApp
                                </button>
                                <button onClick={handleCopyLink} className={`share-button flex items-center gap-2 px-6 py-3 ${copiedLink ? 'bg-green-600' : 'bg-gray-700 hover:bg-gray-800'} text-white rounded-xl font-medium shadow-md`}>
                                    {copiedLink ? '✓ Copied!' : (
                                        <>
                                            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" /></svg>
                                            Copy Link
                                        </>
                                    )}
                                </button>
                            </div>
                        </div>

                        {/* Map */}
                        <div className="bg-gradient-to-r from-green-50 to-emerald-50 border-2 border-green-200 rounded-2xl p-6 mb-8">
                            <div className="flex items-center justify-between flex-wrap gap-4">
                                <div>
                                    <h3 className="text-lg font-bold text-gray-900 mb-1">🗺️ View your itinerary on map</h3>
                                    <p className="text-sm text-gray-600">See all {displayPlaces.length} spots plotted on Google Maps</p>
                                </div>
                                <button onClick={openAllInMaps} className="px-6 py-3 bg-green-600 hover:bg-green-700 text-white rounded-xl font-semibold shadow-md transition-all transform hover:scale-105">
                                    Open in Google Maps →
                                </button>
                            </div>
                        </div>

                        {/* Places */}
                        <div className="mb-12">
                            <h2 className="text-3xl font-bold text-gray-900 mb-6">Your Mumbai Plan for Today</h2>
                            <div className="grid gap-6">
                                {displayPlaces.map((place, idx) => (
                                    <div key={idx} className="bg-white rounded-2xl shadow-lg p-8 hover:shadow-xl transition-shadow">
                                        <div className="flex items-start justify-between mb-4 flex-wrap gap-4">
                                            <div className="flex-1">
                                                <h3 className="text-2xl font-bold text-gray-900 mb-2">{place.name}</h3>
                                                <p className="text-gray-600 italic">{place.vibe}</p>
                                            </div>
                                            <div className="flex items-center gap-3">
                                                <span className="px-4 py-2 bg-blue-50 text-blue-700 rounded-full text-sm font-semibold whitespace-nowrap">{place.budget}</span>
                                                <button 
                                                    onClick={() => openInGoogleMaps(place.name)}
                                                    className="px-4 py-2 bg-green-600 hover:bg-green-700 text-white rounded-full text-sm font-semibold whitespace-nowrap transition-all flex items-center gap-1"
                                                >
                                                    <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                                                    Maps
                                                </button>
                                            </div>
                                        </div>
                                        <div className="grid md:grid-cols-2 gap-4 mb-4">
                                            <div><span className="text-sm font-semibold text-gray-500 block mb-1">⏰ Best time</span><p className="text-gray-800">{place.time}</p></div>
                                            <div><span className="text-sm font-semibold text-gray-500 block mb-1">📍 Location</span><p className="text-gray-800">{place.neighborhood}</p></div>
                                        </div>
                                        <div className="bg-amber-50 border-l-4 border-amber-400 p-4 rounded-lg">
                                            <span className="text-sm font-semibold text-amber-800 block mb-1">💡 Insider tip</span>
                                            <p className="text-amber-900">{place.tip}</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                            <p className="text-center text-gray-500 mt-6">Showing {displayPlaces.length} of {places.length} recommendations perfect for your vibe today</p>
                        </div>

                        {/* Avoid */}
                        <div className="bg-red-50 rounded-2xl p-8 mb-12">
                            <h3 className="text-xl font-bold text-red-900 mb-3">Based on your choices, you'd probably skip:</h3>
                            <p className="text-red-800">{description.avoid}</p>
                        </div>

                        {/* Email Confirmation */}
                        {email && (
                            <div className="bg-green-50 border-2 border-green-200 rounded-2xl p-6 mb-8">
                                <div className="flex items-start gap-4">
                                    <div className="flex-shrink-0 w-12 h-12 bg-green-600 rounded-full flex items-center justify-center">
                                        <svg className="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" /></svg>
                                    </div>
                                    <div>
                                        <h3 className="font-bold text-gray-900 mb-1">Check your inbox!</h3>
                                        <p className="text-gray-700">We've sent your Mumbai plan to <strong>{email}</strong></p>
                                        <p className="text-sm text-gray-600 mt-2">(Demo mode - in production you'd receive a real email)</p>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* CTA */}
                        <div className="text-center space-y-4">
                            <button onClick={onRestart} className="px-8 py-4 bg-white border-2 border-gray-300 hover:border-gray-400 text-gray-700 font-semibold rounded-xl transition-all">
                                ← Build a Different Plan
                            </button>
                            <p className="text-sm text-gray-500">Different mood? Different day? Create a new itinerary anytime</p>
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<MumbaiApp />, document.getElementById('root'));
    </script>
</body>
</html>
