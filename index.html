<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CuRATO - Your Mumbai Plan Today</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .option-card { transition: all 0.2s ease; cursor: pointer; border: 2px solid #e5e7eb; }
        .option-card:active { transform: scale(0.98); }
        .selected { border-color: #2563eb; background-color: #eff6ff; box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- DATABASE --- (Condensed for brevity, include your full list here)
        const PLACES_DATABASE = {
            "Slow Explorer": [
                { name: "Banganga Tank", vibe: "Ancient, Spiritual, Quiet", time: "6:00 AM - 8:00 AM", tip: "The steps are 2,000 years old. Sit by the water before the heat kicks in.", budget: "Free", neighborhood: "Walkeshwar" },
                { name: "David Sassoon Library", vibe: "Heritage, Quiet, Intellectual", time: "10:00 AM - 4:00 PM", tip: "The garden at the back is a hidden oasis in the middle of Fort's chaos.", budget: "₹50", neighborhood: "Kala Ghoda" }
            ],
            "Foodie First": [
                { name: "Ashok Vada Pav", vibe: "Iconic, Street, Essential", time: "11:00 AM - 8:00 PM", tip: "Ask for 'choora' (crispy bits) on the side. It's the local secret.", budget: "₹30", neighborhood: "Dadar" },
                { name: "Cafe Madras", vibe: "South Indian, Fast, Authentic", time: "7:00 AM - 11:00 AM", tip: "Order the 'Podi Idli' and strong Filter Coffee. Expect a 15-min wait.", budget: "₹200", neighborhood: "Matunga" }
            ],
            "Aesthetic Chaser": [
                { name: "Subko Coffee", vibe: "Designer, Modern, Artisanal", time: "9:00 AM - 6:00 PM", tip: "The 'Bloom Bar' upstairs has the best lighting for photos.", budget: "₹500", neighborhood: "Bandra" },
                { name: "Marine Drive", vibe: "Iconic, Sunset, Social", time: "6:00 PM - 7:30 PM", tip: "Sit near the Air India building for the best 'Queen's Necklace' curve view.", budget: "Free", neighborhood: "South Mumbai" }
            ],
            "Culture Vulture": [
                { name: "Prithvi Theatre", vibe: "Artsy, Creative, Intimate", time: "5:00 PM onwards", tip: "Even without a play, the Irish Coffee at the cafe is a Mumbai ritual.", budget: "₹300", neighborhood: "Juhu" },
                { name: "Sassoon Dock", vibe: "Raw, Cinematic, Smelly!", time: "5:00 AM - 7:00 AM", tip: "Wear closed shoes. The fish auction is chaotic but visually incredible.", budget: "Free", neighborhood: "Colaba" }
            ],
            "Social Connector": [
                { name: "Toto's Garage", vibe: "Retro, Rock, Dive Bar", time: "8:00 PM - 1:00 AM", tip: "It's built inside a Beetle car. Get there early to snag a booth.", budget: "₹800", neighborhood: "Bandra" },
                { name: "Bonobo", vibe: "Rooftop, Indie, Vibrant", time: "9:00 PM onwards", tip: "Check their Instagram for vinyl nights; the crowd is much better then.", budget: "₹1500", neighborhood: "Bandra" }
            ],
            "Active Spirit": [
                { name: "Sailing Gateway", vibe: "Breezy, Unique, Adventure", time: "4:00 PM - 6:00 PM", tip: "Book a Seabird class boat. The view of the Taj from the water is unmatched.", budget: "₹1000", neighborhood: "Colaba" },
                { name: "Kanheri Caves Hike", vibe: "Nature, Buddhist, Historic", time: "8:00 AM - 12:00 PM", tip: "Take the bus from the SGNP gate to save energy for the actual cave climb.", budget: "₹150", neighborhood: "Borivali" }
            ],
            "Comfort Seeker": [
                { name: "AER Lounge", vibe: "Luxury, Rooftop, Views", time: "6:00 PM - 8:00 PM", tip: "The sunset over the Arabian Sea from the 34th floor is worth the price.", budget: "₹3000", neighborhood: "Worli" },
                { name: "Sea Lounge Taj", vibe: "Elegant, Colonial, High Tea", time: "3:30 PM - 5:30 PM", tip: "The window seat overlooking the Gateway is the most coveted spot in the city.", budget: "₹2500", neighborhood: "Colaba" }
            ]
        };

        const ARCHETYPES = {
            "Slow Explorer": "You're in the mood for heritage, quiet walks, and hidden history.",
            "Foodie First": "Today is all about flavor. Landmarks are just stops between meals.",
            "Aesthetic Chaser": "You want the most beautiful, well-designed spots in the city.",
            "Culture Vulture": "You're seeking authentic stories, arts, and the soul of Mumbai.",
            "Social Connector": "You want energy, crowds, and a great drink in a cool spot.",
            "Active Spirit": "Movement is the goal. Cycling, hiking, or being on the water.",
            "Comfort Seeker": "AC cars, VIP views, and five-star service only."
        };

        // --- COMPONENTS ---

        function App() {
            const [step, setStep] = useState('home');
            const [choice, setChoice] = useState(null);

            const getResult = (selectedVibe) => {
                setChoice(selectedVibe);
                setStep('result');
            };

            return (
                <div className="max-w-md mx-auto min-h-screen bg-white shadow-xl">
                    {step === 'home' && <Home onStart={() => setStep('quiz')} />}
                    {step === 'quiz' && <Quiz onFinish={getResult} />}
                    {step === 'result' && <Results vibe={choice} onRestart={() => setStep('home')} />}
                </div>
            );
        }

        function Home({ onStart }) {
            return (
                <div className="p-8 flex flex-col items-center justify-center min-h-screen text-center fade-in">
                    <h1 className="text-4xl font-extrabold text-blue-600 mb-2 tracking-tight">CuRATO</h1>
                    <p className="text-slate-500 mb-8 font-medium">Your Hyper-Specific Mumbai Plan</p>
                    <div className="bg-blue-50 p-6 rounded-2xl mb-8">
                        <p className="text-slate-700 leading-relaxed">Stop using generic "Top 10" lists. Tell us your vibe today, and we'll tell you exactly where to go.</p>
                    </div>
                    <button onClick={onStart} className="w-full bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-blue-700 transition-colors">
                        Find My Vibe →
                    </button>
                </div>
            );
        }

        function Quiz({ onFinish }) {
            const vibes = Object.keys(ARCHETYPES);
            return (
                <div className="p-6 fade-in">
                    <h2 className="text-2xl font-bold mb-6 text-slate-800">What's the goal today?</h2>
                    <div className="space-y-3">
                        {vibes.map(v => (
                            <div key={v} onClick={() => onFinish(v)} className="option-card p-4 rounded-xl font-semibold text-slate-700 hover:bg-slate-50">
                                {v}
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function Results({ vibe, onRestart }) {
            const places = PLACES_DATABASE[vibe] || [];
            
            const openMap = (name) => {
                window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(name + " Mumbai")}`, '_blank');
            };

            return (
                <div className="fade-in">
                    <div className="bg-blue-600 p-8 text-white">
                        <span className="text-xs font-bold uppercase tracking-widest opacity-80">Your Match</span>
                        <h2 className="text-3xl font-black mb-2">{vibe}</h2>
                        <p className="text-blue-100">{ARCHETYPES[vibe]}</p>
                    </div>
                    
                    <div className="p-4 space-y-6">
                        {places.map((p, i) => (
                            <div key={i} className="border-b pb-6">
                                <div className="flex justify-between items-start mb-2">
                                    <h3 className="text-xl font-bold text-slate-900">{p.name}</h3>
                                    <span className="text-sm font-bold text-blue-600 bg-blue-50 px-2 py-1 rounded">{p.budget}</span>
                                </div>
                                <p className="text-sm text-slate-500 mb-3 italic">{p.vibe} • {p.neighborhood}</p>
                                <div className="bg-amber-50 border-l-4 border-amber-400 p-3 rounded-r-lg mb-4 text-sm text-amber-900">
                                    <strong>Insider Tip:</strong> {p.tip}
                                </div>
                                <button onClick={() => openMap(p.name)} className="w-full py-3 border-2 border-slate-200 rounded-lg font-bold text-slate-700 flex items-center justify-center gap-2 hover:bg-slate-50">
                                    📍 Open in Google Maps
                                </button>
                            </div>
                        ))}
                        <button onClick={onRestart} className="w-full py-4 text-slate-400 font-medium text-sm">
                            ← Try a different vibe
                        </button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
